name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  website:
    name: Website (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  cli:
    name: CLI sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run CLI help
        run: node cli.js help
